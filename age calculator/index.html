<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Калькулятор возраста</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <h1>Калькулятор <span>возраста</span></h1>
        <div class="input-box">
          <input type="date" id="date" />
          <button onclick="calculateAge()">Подсчёт</button>
        </div>
        <p id="result"></p>
      </div>
    </div>
    <script>
      let userInput;
      let result;
      document.addEventListener("DOMContentLoaded", () => {
        userInput = document.getElementById("date");
        result = document.getElementById("result");
        // Устанавливаем максимальную дату для поля <input type="date"> на сегодняшнюю
        // 1) new Date() — текущая дата и время
        // 2) toISOString() — превращаем её в строку формата "YYYY-MM-DDTHH:mm:ss.sssZ"
        // 3) split("T")[0] — берём только дату "YYYY-MM-DD", без времени
        userInput.max = new Date().toISOString().split("T")[0];
      });

      function calculateAge() {
        let birthDate = new Date(userInput.value);
        let d1 = birthDate.getDate();
        let m1 = birthDate.getMonth() + 1;
        let y1 = birthDate.getFullYear();

        let today = new Date();

        let d2 = today.getDate();
        let m2 = today.getMonth() + 1;
        let y2 = today.getFullYear();

        let d3, m3, y3;

        y3 = y2 - y1;

        if (m2 >= m1) {
          m3 = m2 - m1;
        } else {
          y3--;
          m3 = 12 + m2 - m1;
        }

        if (d2 >= d1) {
          d3 = d2 - d1;
        } else {
          m3--;
          d3 = daysInMonth(y1, m1) + d2 - d1;
        }
        if (m3 < 0) {
          m3 = 11;
          y3--;
        }
        result.innerHTML = `Вам <span>${y3}</span> лет, <span>${m3}</span> месяцев и <span>${d3}</span> дней`;
      }

      function daysInMonth(year, month) {
        return new Date(year, month, 0).getDate();
      }
    </script>
  </body>
</html>

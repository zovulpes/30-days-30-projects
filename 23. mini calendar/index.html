<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini calendar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="hero">
      <div class="calendar">
        <div class="left">
          <p id="date">01</p>
          <p id="day">Sunday</p>
        </div>
        <div class="right">
          <p id="month">January</p>
          <p id="year">2020</p>
        </div>
      </div>
    </div>
    <script>
      const year = document.getElementById("year");
      const month = document.getElementById("month");
      const date = document.getElementById("date");
      const day = document.getElementById("day");

      let today = new Date();

      days = [
        "Sunday",
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday",
      ];

      months = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];

      year.innerHTML = (today.getDate() < 10 ? "0" : "") + today.getFullYear();
      month.innerHTML = months[today.getMonth()];
      date.innerHTML = today.getDate();
      day.innerHTML = days[today.getDay()];
    </script>
  </body>
</html>

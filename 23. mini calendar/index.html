<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini calendar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="hero">
      <div class="calendar">
        <div class="left">
          <p id="date">01</p>
          <p id="day">Sunday</p>
        </div>
        <div class="right">
          <p id="month">January</p>
          <p id="year">2020</p>
        </div>
      </div>
    </div>
    <script>
      const year = document.getElementById("year");
      const month = document.getElementById("month");
      const date = document.getElementById("date");
      const day = document.getElementById("day");

      let today = new Date();

      var yearNow = today.getFullYear();
      var monthNow = today.getMonth();
      var dateNow = today.getDate();
      var dayNow = today.getDay();

      console.log(
        today.getFullYear(),
        today.getMonth(),
        today.getDate(),
        today.getDay(),
      );

      switch (dayNow) {
        case 0:
          dayNow = "Sunday";
          break;
        case 1:
          dayNow = "Monday";
          break;
        case 2:
          dayNow = "Tuesday";
          break;
        case 3:
          dayNow = "Wednesday";
          break;
        case 4:
          dayNow = "Thursday";
          break;
        case 5:
          dayNow = "Friday";
          break;
        case 6:
          dayNow = "Saturday";
          break;
      }

      switch (monthNow) {
        case 0:
          monthNow = "January";
          break;
        case 1:
          monthNow = "February";
          break;
        case 2:
          monthNow = "March";
          break;
        case 3:
          monthNow = "April";
          break;
        case 4:
          monthNow = "May";
          break;
        case 5:
          monthNow = "June";
          break;
        case 6:
          monthNow = "July";
          break;
        case 7:
          monthNow = "August";
          break;
        case 8:
          monthNow = "September";
          break;
        case 9:
          monthNow = "October";
          break;
        case 10:
          monthNow = "November";
          break;
        case 11:
          monthNow = "December";
          break;
      }

      console.log(dayNow);
      console.log(monthNow);

      year.innerHTML = yearNow;
      month.innerHTML = monthNow;
      date.innerHTML = dateNow;
      day.innerHTML = dayNow;
    </script>
  </body>
</html>
